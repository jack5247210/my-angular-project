<div style="width: 500px; margin: 50px auto; text-align: center;">
  <h2>問卷結果統計分析</h2>


  <div style="margin-bottom: 20px;">
    <label for="chartSelect">選擇要顯示的圖表：</label>
    <select id="chartSelect" [(ngModel)]="selectedChart">
      <option value="pieChartOptions">最受歡迎餐點 (圓餅圖)</option>
      <option value="lineChartOptions">口味評分 (折線圖)</option>
      <option value="lineChartOptions2">新鮮度評分 (折線圖)</option>
      <option value="lineChartOptions3">速度評分 (折線圖)</option>
      <option value="lineChartOptions4">環境評分 (折線圖)</option>
      <option value="lineChartOptions5">氛圍評分 (折線圖)</option>
      <option value="lineChartOptions6">性價比評分 (折線圖)</option>
    </select>
  </div>


<!-- 這裡的selectedChart要跟上面的option value一樣 -->
  <div *ngIf="selectedChart === 'pieChartOptions'">
    <h3>最受歡迎餐點</h3>
    <canvas baseChart
      [data]="pieChartData"
      [options]="pieChartOptions"
      [type]="pieChartType">
    </canvas>
  </div>

  <div *ngIf="selectedChart === 'lineChartOptions'">
    <h3>口味滿意度趨勢</h3>
    <canvas baseChart
      [data]="lineChartData"
      [options]="lineChartOptions"
      [type]="lineChartType">
    </canvas>
  </div>

  <div *ngIf="selectedChart === 'lineChartOptions2'">
    <h3>上菜速度評價</h3>
    <canvas baseChart
      [data]="lineChartData2"
      [options]="lineChartOptions2"
      [type]="lineChartType2">
    </canvas>
  </div>

  <div *ngIf="selectedChart === 'lineChartOptions3'">
    <h3>餐廳環境評價</h3>
    <canvas baseChart
      [data]="lineChartData3"
      [options]="lineChartOptions3"
      [type]="lineChartType3">
    </canvas>
  </div>

  <div *ngIf="selectedChart === 'lineChartOptions4'">
    <h3>餐廳氛圍評價</h3>
    <canvas baseChart
      [data]="lineChartData4"
      [options]="lineChartOptions4"
      [type]="lineChartType4">
    </canvas>
  </div>

  <!-- Block（區塊）：像一塊大磚塊。它會獨佔一行，寬度預設撐滿整個父容器。  baseChart是指令 -->
  <div *ngIf="selectedChart === 'lineChartOptions5'">
    <h3>餐點性價比評價</h3>
    <canvas baseChart
      [data]="lineChartData5"
      [options]="lineChartOptions5"
      [type]="lineChartType5">
    </canvas>
  </div>

    <div *ngIf="selectedChart === 'lineChartOptions6'">
    <h3>上菜速度評價</h3>
    <canvas baseChart
      [data]="lineChartData6"
      [options]="lineChartOptions6"
      [type]="lineChartType6">
    </canvas>
  </div>
